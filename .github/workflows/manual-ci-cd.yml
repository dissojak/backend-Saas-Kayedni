name: Manual CI/CD (Backend)

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run Maven tests"
        required: false
        default: false
        type: boolean
      run_deploy:
        description: "Run deploy placeholder"
        required: false
        default: false
        type: boolean

concurrency:
  group: backend-manual-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build and Optional Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Compile (no tests)
        run: ./mvnw -B -DskipTests compile

      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: ./mvnw -B test

  deploy:
    name: Deploy Placeholder
    runs-on: ubuntu-latest
    needs: ci
    if: ${{ inputs.run_deploy }}
    steps:
      - name: Deployment disabled by default
        run: |
          echo "Manual deploy placeholder."
          echo "Add your real deployment steps/secrets when ready for production."
