# Configuration de la base de donn�es MySQL

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuration JWT
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# Configuration d'email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Configuration de l'application
application.base-url=http://localhost:8088/api
application.email.from-display-name=Bookify

# Configuration Google Gemini
# IMPORTANT: Do not hardcode API keys. Provide it via environment variable GEMINI_API_KEY.
# Example (macOS/Linux): export GEMINI_API_KEY="<your-new-key>"
# Example (Windows PowerShell): $Env:GEMINI_API_KEY="<your-new-key>"
# Spring will read it into this property at runtime.
gemini.api.key=${GEMINI_API_KEY:}
# Use gemini-2.0-flash for better free tier compatibility (gemini-2.5-flash may have stricter limits)
gemini.api.model=gemini-2.5-flash-lite
gemini.api.temperature=0.7
gemini.api.max-tokens=1000

# Configuration serveur
server.port=8088
server.servlet.context-path=/api

# Configuration pour SpringDoc OpenAPI
# Utiliser le chemin standard /v3/api-docs pour �viter les confusions et assurer la compatibilit� avec Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
# Indiquer explicitement l'URL du fichier OpenAPI pour Swagger UI (compatibilit� avec context-path = /api)
# Si server.servlet.context-path=/api alors l'URL compl�te devient /api/v3/api-docs
springdoc.swagger-ui.url=/api/v3/api-docs
# Indiquer explicitement l'URL du swagger-config utilis� par le frontend de Swagger UI
springdoc.swagger-ui.configUrl=/api/v3/api-docs/swagger-config

# Configuration des t�ches planifi�es
spring.task.scheduling.enabled=true
spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=scheduled-task-

# Configuration du fuseau horaire pour les t�ches planifi�es
spring.task.scheduling.shutdown.await-termination=true
spring.task.scheduling.shutdown.await-termination-period=60s

# Logging pour les t�ches planifi�es
logging.level.com.bookify.backendbookify_saas.schedulers=INFO

# Google AI Studio Usage Link
# https://aistudio.google.com/usage

# Cloudinary configuration (override via env vars in production)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.folder=${CLOUDINARY_FOLDER}
cloudinary.public-id-prefix=${CLOUDINARY_KEY_NAME}

# Logging to help diagnose Hibernate entity persister / flush issues
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.hibernate.persister.entity=DEBUG
logging.level.org.hibernate.event=DEBUG
logging.level.org.hibernate.engine.spi=DEBUG