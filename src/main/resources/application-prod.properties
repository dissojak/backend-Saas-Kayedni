# Production Profile

# Database - override via env vars on VPS
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA - never auto-update schema in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logging - production appropriate levels
logging.level.root=WARN
logging.level.com.bookify=INFO
logging.level.com.bookify.backendbookify_saas.schedulers=INFO
logging.level.org.hibernate=WARN

# Server
server.port=${SERVER_PORT:8088}

# Frontend URL
app.frontend-url=${APP_FRONTEND_URL}

# AI Rate Limiting - adjust as needed in production
ai.max-reevaluations-per-day=${AI_MAX_REEVALUATIONS_PER_DAY:5}
