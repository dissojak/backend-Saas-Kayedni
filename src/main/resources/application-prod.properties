# Configuration Google Gemini
# IMPORTANT: Do not hardcode API keys. Provide it via environment variable GEMINI_API_KEY.
# Example (macOS/Linux): export GEMINI_API_KEY="<your-new-key>"
# Example (Windows PowerShell): $Env:GEMINI_API_KEY="<your-new-key>"
# Spring will read it into this property at runtime.
gemini.api.key=${GEMINI_API_KEY:}
# Use gemini-2.0-flash for better free tier compatibility (gemini-2.5-flash may have stricter limits)
gemini.api.model=gemini-2.5-flash-lite
gemini.api.temperature=0.7
gemini.api.max-tokens=1000

# Configuration AI Rate Limiting
ai.max-reevaluations-per-day=5

# Configuration serveur
server.port=8088
server.servlet.context-path=/api

# Configuration pour SpringDoc OpenAPI
# Utiliser le chemin standard /v3/api-docs pour ’┐Įviter les confusions et assurer la compatibilit’┐Į avec Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
# Indiquer explicitement l'URL du fichier OpenAPI pour Swagger UI (compatibilit’┐Į avec context-path = /api)
# Si server.servlet.context-path=/api alors l'URL compl’┐Įte devient /api/v3/api-docs
springdoc.swagger-ui.url=/api/v3/api-docs
# Indiquer explicitement l'URL du swagger-config utilis’┐Į par le frontend de Swagger UI
springdoc.swagger-ui.configUrl=/api/v3/api-docs/swagger-config

# Configuration des t’┐Įches planifi’┐Įes
