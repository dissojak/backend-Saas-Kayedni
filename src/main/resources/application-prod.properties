# Production Configuration for Railway

# Disable verbose Hibernate logging in production
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.level.org.hibernate.persister.entity=WARN
logging.level.org.hibernate.event=WARN
logging.level.org.hibernate.engine.spi=WARN

# Reduce JPA logging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Keep only essential application logs
logging.level.root=INFO
logging.level.com.bookify.backendbookify_saas=INFO

# Optimize Hibernate for production
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Connection pool optimization for Railway
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Use Railway's dynamic port
server.port=${PORT:8088}

# Update base URL for production (Railway will provide this)
application.base-url=${APP_URL:http://localhost:8088}/api

