# Production Profile

# Database - override via env vars on VPS
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA - never auto-update schema in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logging - production appropriate levels
logging.level.root=WARN
logging.level.com.bookify=INFO
logging.level.com.bookify.backendbookify_saas.schedulers=INFO
logging.level.org.hibernate=WARN

# Server
server.port=${SERVER_PORT:8088}

# Frontend URL
app.frontend-url=${APP_FRONTEND_URL}

# Business QR configuration
business.qr.image-size=${BUSINESS_QR_IMAGE_SIZE:1024}
business.qr.logo-scale-ratio=${BUSINESS_QR_LOGO_SCALE_RATIO:0.2}
business.qr.foreground-color=${BUSINESS_QR_FOREGROUND_COLOR:#000000}
business.qr.background-color=${BUSINESS_QR_BACKGROUND_COLOR:#FFFFFF}
business.qr.frontend-base-url=${BUSINESS_QR_FRONTEND_BASE_URL:${APP_FRONTEND_URL}}
business.qr.cloudinary-folder=${BUSINESS_QR_CLOUDINARY_FOLDER:${CLOUDINARY_FOLDER:Bookify}/business-qr}

# AI Rate Limiting - adjust as needed in production
ai.max-reevaluations-per-day=${AI_MAX_REEVALUATIONS_PER_DAY:5}
